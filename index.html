<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volcano Island: 2-Player Chaos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Quicksand:wght@400;700&display=swap');

        :root {
            --p1-color: #e91e63;
            --p2-color: #2196f3;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #2c3e50;
            margin: 0;
            overflow: hidden;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-title {
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #000;
            z-index: 50;
        }

        /* Board Container */
        #game-board {
            position: relative;
            width: 95%;
            max-width: 900px;
            aspect-ratio: 4/3;
            background: linear-gradient(to bottom, #87ceeb 0%, #4682b4 100%);
            border: 8px solid #3e2723;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            background-image: url('https://images.unsplash.com/photo-1552560870-20e17698e6da?auto=format&fit=crop&q=80&w=1000'); 
            background-size: cover;
            z-index: 10;
        }

        .island-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .node {
            position: absolute;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: white;
            border: 3px solid #333;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #333;
            z-index: 10; font-size: 12px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .node.red { background-color: #ff5252; color: white; border-color: #b71c1c; }
        .node.yellow { background-color: #ffd740; border-color: #f57f17; }
        .node.blue { background-color: #448aff; color: white; border-color: #0d47a1; }
        .node.start { width: 60px; height: 60px; background: #fff; font-size: 16px; border: 4px solid #333; }
        .node.goal { width: 70px; height: 70px; background: #ffd740; border: 4px dashed #f57f17; }

        /* Player Tokens */
        .player-token {
            position: absolute;
            width: 32px; height: 32px;
            border: 2px solid white;
            border-radius: 50%;
            z-index: 100;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        #player1 { background: var(--p1-color); box-shadow: 0 0 15px rgba(233, 30, 99, 0.7); }
        #player2 { background: var(--p2-color); box-shadow: 0 0 15px rgba(33, 150, 243, 0.7); }

        .active-player-indicator { border: 4px solid white; transform: scale(1.2); z-index: 101; }

        /* HUD Status Cards */
        .status-card {
            position: fixed;
            top: 20px;
            width: 180px;
            padding: 15px;
            border-radius: 20px;
            z-index: 100;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.2);
        }
        #status-p1 { left: 20px; background: var(--p1-color); }
        #status-p2 { right: 20px; background: var(--p2-color); }

        .status-card.inactive { opacity: 0.5; transform: scale(0.8); filter: grayscale(0.5); }
        .status-card.active { opacity: 1; transform: scale(1); border-color: white; box-shadow: 0 0 30px rgba(255,255,255,0.3); }

        /* Traveling Dice Container */
        #dice-container {
            position: fixed;
            top: 20px;
            width: 100px;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 110;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .dice {
            width: 60px; height: 60px;
            background: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; color: #333;
            box-shadow: 0 6px 0 #ddd, 0 10px 15px rgba(0,0,0,0.3);
            user-select: none;
        }

        .rolling { animation: shake 0.2s infinite; }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 2px) rotate(1deg); }
        }

        /* Modal */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            display: none;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: white; color: #333; padding: 30px; border-radius: 25px;
            max-width: 450px; width: 100%; text-align: center; border: 8px solid #ffd740;
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .volcano { position: absolute; right: 10px; top: 10px; font-size: 60px; z-index: 2; }
        .ship { position: absolute; bottom: 80px; left: 50%; font-size: 40px; z-index: 2; transform: translateX(-50%); }

        #roll-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            width: 320px;
        }
        #roll-btn:disabled { opacity: 0.7; filter: grayscale(0.5); cursor: not-allowed; }
    </style>
</head>
<body>

    <h1 class="game-title text-4xl md:text-5xl text-yellow-400 mt-2 mb-4">VOLCANO ISLAND</h1>

    <!-- HUD Players -->
    <div id="status-p1" class="status-card active">
        <p class="text-xs uppercase font-black mb-1 text-white/80">Player 1</p>
        <div class="text-5xl mb-1">🤠</div>
        <p id="p1-space" class="text-xl font-black">START</p>
        <div id="p1-skip" class="hidden text-[10px] bg-white text-pink-600 px-3 py-1 rounded-full mt-2 font-bold animate-pulse">SKIPPING...</div>
    </div>

    <div id="status-p2" class="status-card inactive">
        <p class="text-xs uppercase font-black mb-1 text-white/80">Player 2</p>
        <div class="text-5xl mb-1">😎</div>
        <p id="p2-space" class="text-xl font-black">START</p>
        <div id="p2-skip" class="hidden text-[10px] bg-white text-blue-600 px-3 py-1 rounded-full mt-2 font-bold animate-pulse">SKIPPING...</div>
    </div>

    <!-- Traveling Dice Container -->
    <div id="dice-container" style="left: 210px;">
        <div id="dice" class="dice">⚀</div>
        <p id="turn-display" class="text-[10px] font-bold opacity-70 uppercase mt-2">Turn 1</p>
    </div>

    <div id="game-board">
        <svg class="island-svg" viewBox="0 0 1000 750">
            <path d="M0,0 L400,0 C350,200 250,400 0,500 Z" fill="#7eb344" />
            <path d="M700,0 L1000,0 L1000,300 C850,250 750,150 700,0 Z" fill="#7eb344" />
            <path d="M1000,500 C800,550 750,750 1000,750 Z" fill="#7eb344" />
        </svg>
        <div class="volcano">🌋</div>
        <div class="ship">🚢</div>
        <div id="path-container"></div>
        <div id="player1" class="player-token">🤠</div>
        <div id="player2" class="player-token">😎</div>
    </div>

    <button id="roll-btn" class="bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 px-12 rounded-full text-2xl shadow-2xl transition-all transform active:scale-95 border-b-4 border-yellow-700">
        PLAYER 1: ROLL!
    </button>

    <!-- Modal -->
    <div id="modal-overlay">
        <div class="modal-content">
            <h2 id="event-player" class="text-xs font-black uppercase text-gray-400 tracking-widest mb-1">Player 1</h2>
            <h2 id="event-type" class="text-2xl font-black uppercase mb-1">Chaos Event!</h2>
            <hr class="border-gray-200 mb-4">
            <h3 id="event-title" class="text-xl font-bold text-red-600 mb-4">Event</h3>
            <p id="event-desc" class="text-gray-600 text-lg mb-8 leading-tight">Description</p>
            <button id="close-modal" class="w-full bg-blue-600 text-white font-black py-4 px-8 rounded-2xl hover:bg-blue-700 shadow-xl">CONTINUE</button>
        </div>
    </div>

    <script>
        const pathData = [
            { id: 0, label: 'START', x: 100, y: 150, type: 'start' },
            { id: 1, label: '01', x: 100, y: 250, type: 'red' },
            { id: 2, label: '02', x: 150, y: 350, type: 'white' },
            { id: 3, label: '03', x: 220, y: 430, type: 'white' },
            { id: 4, label: '04', x: 300, y: 480, type: 'blue' },
            { id: 5, label: '05', x: 380, y: 450, type: 'white' },
            { id: 6, label: '06', x: 420, y: 360, type: 'white' },
            { id: 7, label: '07', x: 480, y: 280, type: 'white' },
            { id: 8, label: '08', x: 580, y: 240, type: 'blue' },
            { id: 9, label: '09', x: 680, y: 240, type: 'white' },
            { id: 10, label: '10', x: 780, y: 240, type: 'yellow' },
            { id: 11, label: '11', x: 850, y: 320, type: 'white' },
            { id: 12, label: '12', x: 920, y: 410, type: 'red' },
            { id: 13, label: '13', x: 850, y: 500, type: 'white' },
            { id: 14, label: '14', x: 750, y: 550, type: 'blue' },
            { id: 15, label: '15', x: 650, y: 550, type: 'white' },
            { id: 16, label: '16', x: 550, y: 550, type: 'white' },
            { id: 17, label: '17', x: 460, y: 580, type: 'yellow' },
            { id: 18, label: '18', x: 400, y: 680, type: 'white' },
            { id: 19, label: '19', x: 400, y: 780, type: 'red' },
            { id: 20, label: '20', x: 480, y: 850, type: 'white' },
            { id: 21, label: '21', x: 580, y: 880, type: 'white' },
            { id: 22, label: '22', x: 680, y: 850, type: 'white' },
            { id: 23, label: '23', x: 780, y: 800, type: 'yellow' },
            { id: 24, label: 'GOAL', x: 880, y: 750, type: 'goal' }
        ];

        const chaosEvents = [
            { title: "The All-Nighter", desc: "You studied until 4 AM! Move forward 3 spaces, but skip your next turn.", effect: (idx) => { moveStepByStep(idx, 3); state.players[idx].skip = true; } },
            { title: "Group Project Success", desc: "You worked together! Both players move forward 2 spaces.", effect: (idx) => { moveStepByStep(0, 2); moveStepByStep(1, 2); } },
            { title: "Scholarship Found!", desc: "Financial aid arrived! Run forward 4 spaces.", effect: (idx) => moveStepByStep(idx, 4) },
            { title: "Caffeine Rush!", desc: "Way too much coffee! Roll again immediately.", effect: (idx) => { state.canRollAgain = true; } },
            { title: "Pop Quiz!", desc: "Panicked! You ran back 3 spaces to check your notes.", effect: (idx) => moveStepByStep(idx, -3) },
            { title: "Wi-Fi Outage", desc: "Disconnected! You stay where you are for 1 turn.", effect: (idx) => { state.players[idx].skip = true; } },
            { title: "Summer Break", desc: "Finals are over! Sprint forward 6 spaces.", effect: (idx) => moveStepByStep(idx, 6) }
        ];

        const state = {
            players: [
                { pos: 0, skip: false, el: null, spaceEl: null, skipEl: null, statusEl: null },
                { pos: 0, skip: false, el: null, spaceEl: null, skipEl: null, statusEl: null }
            ],
            activePlayerIdx: 0,
            turns: 1,
            isMoving: false,
            isRolling: false,
            canRollAgain: false,
            gameEnded: false
        };

        const diceIcons = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        const diceEl = document.getElementById('dice');
        const diceContainer = document.getElementById('dice-container');
        const rollBtn = document.getElementById('roll-btn');
        const modal = document.getElementById('modal-overlay');

        function init() {
            const container = document.getElementById('path-container');
            pathData.forEach(node => {
                const div = document.createElement('div');
                div.className = `node ${node.type}`;
                div.style.left = `${node.x / 10}%`;
                div.style.top = `${node.y / 10}%`;
                div.innerText = node.label;
                container.appendChild(div);
            });

            state.players[0].el = document.getElementById('player1');
            state.players[0].spaceEl = document.getElementById('p1-space');
            state.players[0].skipEl = document.getElementById('p1-skip');
            state.players[0].statusEl = document.getElementById('status-p1');

            state.players[1].el = document.getElementById('player2');
            state.players[1].spaceEl = document.getElementById('p2-space');
            state.players[1].skipEl = document.getElementById('p2-skip');
            state.players[1].statusEl = document.getElementById('status-p2');

            updateUI();
        }

        function updateUI() {
            // Dice corner positioning
            if (state.activePlayerIdx === 0) {
                diceContainer.style.left = '210px';
                diceContainer.style.right = 'auto';
            } else {
                diceContainer.style.left = 'auto';
                diceContainer.style.right = '210px';
            }

            state.players.forEach((p, idx) => {
                const node = pathData[p.pos];
                const offsetX = idx === 0 ? -12 : 12;
                const offsetY = idx === 0 ? -12 : 12;
                
                p.el.style.left = `calc(${node.x / 10}% + 15px + ${offsetX}px)`;
                p.el.style.top = `calc(${node.y / 10}% + 15px + ${offsetY}px)`;
                p.spaceEl.innerText = node.label;
                
                if (p.skip) p.skipEl.classList.remove('hidden');
                else p.skipEl.classList.add('hidden');

                if (state.activePlayerIdx === idx) {
                    p.statusEl.classList.add('active');
                    p.statusEl.classList.remove('inactive');
                    p.el.classList.add('active-player-indicator');
                } else {
                    p.statusEl.classList.remove('active');
                    p.statusEl.classList.add('inactive');
                    p.el.classList.remove('active-player-indicator');
                }
            });

            if (!state.gameEnded) {
                rollBtn.innerText = `PLAYER ${state.activePlayerIdx + 1}: ROLL!`;
                rollBtn.style.backgroundColor = state.activePlayerIdx === 0 ? '#ec4899' : '#3b82f6';
                rollBtn.style.color = 'white';
                rollBtn.disabled = state.isMoving || state.isRolling;
            }
            document.getElementById('turn-display').innerText = `Turn ${state.turns}`;
        }

        async function moveStepByStep(playerIdx, steps) {
            state.isMoving = true;
            updateUI();

            const dir = steps > 0 ? 1 : -1;
            const absSteps = Math.abs(steps);

            for (let i = 0; i < absSteps; i++) {
                const nextPos = state.players[playerIdx].pos + dir;
                if (nextPos < 0 || nextPos >= pathData.length) break;
                
                state.players[playerIdx].pos = nextPos;
                updateUI();
                
                if (state.players[playerIdx].pos === pathData.length - 1) {
                    state.gameEnded = true;
                    break;
                }
                await new Promise(r => setTimeout(r, 350));
            }

            state.isMoving = false;
            updateUI();

            if (state.gameEnded) {
                endGame(playerIdx);
            } else if (steps > 0 && playerIdx === state.activePlayerIdx) {
                checkSpaceAction();
            }
        }

        function endGame(playerIdx) {
            showEvent(playerIdx, "VICTORY!", "TREASURE REACHED!", `Player ${playerIdx + 1} reached the goal first and survives the semester! Winner!`);
            rollBtn.disabled = true;
            rollBtn.innerText = "GAME OVER";
            rollBtn.style.backgroundColor = "#111";
        }

        function checkSpaceAction() {
            const idx = state.activePlayerIdx;
            const node = pathData[state.players[idx].pos];
            if (node.type === 'yellow') {
                const ev = chaosEvents[Math.floor(Math.random() * chaosEvents.length)];
                showEvent(idx, "CHAOS!", ev.title, ev.desc);
                ev.effect(idx);
            } else if (node.type === 'red') {
                const isCroc = state.players[idx].pos === 12;
                const jump = isCroc ? -5 : -2;
                showEvent(idx, "DANGER!", isCroc ? "CROCODILE!" : "Volcano Ash!", `Move back ${Math.abs(jump)} spaces!`);
                moveStepByStep(idx, jump);
            } else if (node.type === 'blue') {
                showEvent(idx, "LUCK", "Ocean Current", "A gentle wave pushes you forward 2 spaces!");
                moveStepByStep(idx, 2);
            }
        }

        function showEvent(playerIdx, type, title, desc) {
            document.getElementById('event-player').innerText = `Player ${playerIdx + 1}`;
            document.getElementById('event-type').innerText = type;
            document.getElementById('event-title').innerText = title;
            document.getElementById('event-desc').innerText = desc;
            modal.style.display = 'flex';
        }

        rollBtn.onclick = () => {
            if (state.isMoving || state.isRolling || state.gameEnded) return;

            const activeP = state.players[state.activePlayerIdx];

            if (activeP.skip) {
                activeP.skip = false;
                showEvent(state.activePlayerIdx, "RESTING", "Catching Zzzs", "You were exhausted from the last event and skipped your turn.");
                switchTurn();
                return;
            }

            state.isRolling = true;
            diceEl.classList.add('rolling');
            
            let count = 0;
            const timer = setInterval(() => {
                diceEl.innerText = diceIcons[Math.floor(Math.random() * 6)];
                if (++count > 10) {
                    clearInterval(timer);
                    const roll = Math.ceil(Math.random() * 6);
                    diceEl.innerText = diceIcons[roll - 1];
                    diceEl.classList.remove('rolling');
                    state.isRolling = false;
                    moveStepByStep(state.activePlayerIdx, roll);
                }
            }, 80);
        };

        function switchTurn() {
            if (state.canRollAgain) {
                state.canRollAgain = false;
            } else {
                state.activePlayerIdx = state.activePlayerIdx === 0 ? 1 : 0;
                if (state.activePlayerIdx === 0) state.turns++;
            }
            updateUI();
        }

        document.getElementById('close-modal').onclick = () => {
            modal.style.display = 'none';
            if (!state.gameEnded && !state.isMoving) switchTurn();
        };

        window.onload = init;
    </script>
</body>
</html>
